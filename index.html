<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">

  <div class="mb-4">
    <div class="text-4xl">🐙</div>
    <h2 class="text-xl font-bold mt-2">GitHub Issues Tracker</h2>
    <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
  </div>

  <input id="username" class="w-full border p-2 rounded mb-3" placeholder="Username">
  <input id="password" type="password" class="w-full border p-2 rounded mb-3" placeholder="Password">

  <button onclick="login()" class="w-full bg-purple-600 text-white py-2 rounded hover:bg-purple-700">
    Sign In
  </button>

  <div class="mt-4 text-sm text-gray-500">
    Username: <b>admin</b><br>
    Password: <b>admin123</b>
  </div>

</div>

<script src="./js/script.js"></script>
</body>
</html>
